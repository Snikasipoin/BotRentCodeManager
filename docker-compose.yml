version: "3.9"

services:
  bot:
    build: .
    container_name: cs2_rent_bot
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: unless-stopped
    command: python -m bot.main

  db:
    image: postgres:16
    container_name: cs2_rent_db
    environment:
      POSTGRES_DB: cs2_rent_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: cs2_rent_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data: